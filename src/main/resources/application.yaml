server:
  port: ${SERVER_PORT}
spring:
  application:
    name: ${SPRING_APPLICATION_NAME}
  # Enables Project Loom virtual threads (Java 21).
  # Incoming HTTP requests run on virtual threads, which improves scalability for blocking I/O workloads.
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    # Disable Open Session in View to close the persistence context at transaction boundaries.
    # This avoids long-held DB connections during response rendering and enforces explicit fetch planning.
    open-in-view: false

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # HikariCP pool settings tuned for high-concurrency workloads with virtual threads.
      # Virtual threads can scale to very high counts, but DB connections remain a hard capacity limit.
      maximum-pool-size: 20

      # Fail fast when no connection is available; prevents long request queuing under DB pressure.
      connection-timeout: 2000

      # Keep idle connections alive to reduce stale-connection failures caused by network middleboxes.
      keepalive-time: 30000

      # Recycle connections periodically to avoid long-lived stale sessions and improve failover behavior.
      # Keep this lower than DB-side idle/session timeouts.
      max-lifetime: 1800000

tpay:
  api:
    url: ${TPAY_API_URL}
    client-id: ${TPAY_API_CLIENT_ID}
    client-secret: ${TPAY_API_CLIENT_SECRET}
    security-code: ${TPAY_API_SECURITY_CODE}
  app:
    notification-url: ${TPAY_APP_NOTIFICATION_URL}
    return-success-url: ${TPAY_APP_RETURN_SUCCESS_URL}
    return-error-url: ${TPAY_APP_RETURN_ERROR_URL}

