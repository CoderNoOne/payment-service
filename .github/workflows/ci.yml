name: ci/cd pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (package)
        run: mvn clean package --batch-mode --no-transfer-progress

      - name: Run unit tests
        run: mvn test --batch-mode --no-transfer-progress

      - name: Run integration tests
        run: mvn failsafe:integration-test failsafe:verify --batch-mode --no-transfer-progress

      - name: Generate JaCoCo report
        run: mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy-to-ubuntu:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create archive
        run: |
          tar \
            --warning=no-file-changed \
            --exclude=.git \
            --exclude=.github \
            --exclude=target \
            -czf app.tar.gz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host my-ubuntu
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      - name: Upload app to server (rsync)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='target' \
            ./ my-ubuntu:/home/ubuntu/applications/payments-service/

      - name: Deploy on server
        run: |
          ssh my-ubuntu '
            APP_DIR="/home/ubuntu/applications/payments-service"
            cd "$APP_DIR"
            docker compose down || true
            docker compose up -d --build
          '